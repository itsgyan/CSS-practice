<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attribute Selector</title>
    <style>
      input[type] {
        color: yellow;
        background-color: black;
      }
      input[type="number"] {
        color: red;
        background-color: black;
      }
    </style>
  </head>
  <body>
    <label for="">Name :</label>
    <input type="text" name="" id="" />
    <br /><br />
    <hr />
    <br /><br />
    <label for="">LName</label>
    <input type="number" />
  </body>
</html>
