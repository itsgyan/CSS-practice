<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Model</title>
    <style>
      h1 {
        /* Padding ---------------------------------------- */
        padding: 20px;
        padding: 10px 20px;
        padding: 10px 20px 30px;
        padding: 10px 20px 30px 40px;
        /* Border------------------------------------------ */
        border-width: 10px;
        border-style: ridge;
        border-color: chartreuse;
        border-radius: 20px;
        /* Border Specific  */
        border-top-color: black;
        border-right-style: dotted;
        border-bottom-width: 20px;
        border-top-left-radius: 10px;
        border-bottom-color: darkgoldenrod;

        /* Margin */
        margin-top: 30px;
        margin-bottom: 30px;
        margin-left: 100px;
      }
      table {
        border-collapse: collapse;
        border-collapse: separate;
      }
    </style>
  </head>
  <body>
    <!-- H1 tag -->
    <h1>Loooo............. Dash Fellow Fill the dash</h1>
    <!-- Table  -->
    <table width="300px" height="200px" border="3px">
      <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
      </tr>
      <tr>
        <td>4</td>
        <td>5</td>
        <td>6</td>
      </tr>
      <tr>
        <td>7</td>
        <td>8</td>
        <td>9</td>
      </tr>
    </table>
  </body>
</html>
