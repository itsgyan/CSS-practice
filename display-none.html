<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display Properties</title>
    <style>
      #a {
        width: 200px;
        height: 300px;
        border: 2px solid red;
      }
      #b {
        width: 200px;
        height: 300px;
        border: 2px solid blue;
      }
      .x {
        width: 100px;
        height: 100px;
        background-color: red;
      }
      .y {
        width: 100px;
        height: 100px;
        background-color: yellow;
        display: none;
      }
      .z {
        width: 100px;
        height: 100px;
        background-color: blue;
      }
      .m {
        width: 100px;
        height: 100px;
        background-color: red;
      }
      .n {
        width: 100px;
        height: 100px;
        background-color: yellow;
        visibility: hidden;
      }
      .o {
        width: 100px;
        height: 100px;
        background-color: blue;
      }
      body {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="a">
      <main class="x"></main>
      <main class="y"></main>
      <main class="z"></main>
    </div>
    <div id="b">
      <article class="m"></article>
      <article class="n"></article>
      <article class="o"></article>
    </div>
  </body>
</html>
