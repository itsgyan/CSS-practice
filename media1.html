<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Query Height</title>
    <style>
      #a {
        width: 100%;
        height: 100vh;
        background-color: black;
      }

      @media screen and (min-height: 0px) and (max-height: 200px) {
        #a {
          background-color: crimson;
        }
      }

      @media screen and (min-height: 201px) and (max-height: 600px) {
        #a {
          background-color: cornflowerblue;
        }
      }
      @media screen and (min-height: 601px) and (max-height: 1000px) {
        #a {
          background-color: yellow;
        }
      }
    </style>
  </head>
  <body>
    <div id="a"></div>
  </body>
</html>
