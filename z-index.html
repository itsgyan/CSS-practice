<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Z- index</title>
    <style>
      #a {
        width: 300px;
        height: 300px;
        border: 2px solid red;
        position: relative;
      }

      article {
        width: 100px;
        height: 100px;
        background-color: black;
        position: absolute;
        z-index: 1;
        top: 0;
        left: 0;
      }
      main {
        width: 100px;
        height: 100px;
        background-color: blue;
        position: absolute;
        z-index: 3;
        top: 100px;
        left: 100px;
      }
      aside {
        width: 100px;
        height: 100px;
        background-color: green;
        position: absolute;
        z-index: 2;
        top: 200px;
        left: 200px;
      }
    </style>
  </head>
  <body>
    <div id="a">
      <aside></aside>
      <article></article>
      <main></main>
    </div>
  </body>
</html>
